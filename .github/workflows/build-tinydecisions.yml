name: Build Tiny Decisions APK

on:
  push:
    branches:
      - claude/android-app-conversion-bdt5K
    paths:
      - 'TinyDecisions/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x TinyDecisions/gradlew

      - name: Build debug APK
        working-directory: TinyDecisions
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TinyDecisions-debug
          path: TinyDecisions/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
