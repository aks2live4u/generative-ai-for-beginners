name: Build Tiny Decisions APK

on:
  push:
    branches:
      - claude/android-app-conversion-bdt5K
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > TinyDecisions/local.properties

      - name: Build debug APK
        working-directory: TinyDecisions
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TinyDecisions-debug
          path: TinyDecisions/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
