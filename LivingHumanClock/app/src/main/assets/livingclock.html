<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Living Human Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Cinzel:wght@500;700&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;
  --stone:#1a1a1a;
  --stone-light:#262422;
  --gold:#d4af6a;
  --gold-soft:#f1d9a8;
  --gold-deep:#9c7a3c;
  --water:#13384a;
  --water-light:#3f7e94;
  --highlight:#f4f1ea;
  --night:#0c1a33;
  --radius-fountain:21%;
  --radius-hour:65%;
  --radius-minute:85%;
  --radius-second:95%;
  --radius-numbers:100%;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--highlight)}

.stage{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 38%, #0d0d0d 0%, #050505 62%, #020202 100%);
}

/* ============ SCENE / ISOMETRIC CAMERA ============ */
.scene{
  position:relative;
  width:min(94vmin,560px);
  height:min(94vmin,560px);
}
/* Isometric camera, faked with a 2.5D squash (avoids fragile nested
   3D-transform composition): viewing a circle from ~40deg elevation
   compresses it vertically by sin(40deg) ~= 0.64, producing a clean
   ellipse. Every figure below counter-scales to stand upright again. */
.dial{
  position:absolute;inset:0;border-radius:50%;
  transform:scaleY(0.64);
  transform-origin:50% 50%;
  transition:transform .6s ease;
}
.plane{
  position:absolute;inset:0;border-radius:50%;
}

/* ============ GROUND / PARK ============ */
.ground{
  position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, #232120 0%, var(--stone) 46%, #121110 78%, #0a0a0a 100%);
  box-shadow:
    inset 0 0 60px 10px rgba(0,0,0,.75),
    0 40px 90px -10px rgba(0,0,0,.85);
  overflow:hidden;
}
.ground::before{ /* stone tile seams */
  content:'';position:absolute;inset:0;border-radius:50%;
  background-image:
    repeating-conic-gradient(rgba(255,255,255,.018) 0deg 2deg, transparent 2deg 30deg),
    repeating-radial-gradient(circle at 50% 50%, rgba(0,0,0,.12) 0 1px, transparent 1px 38px);
  mix-blend-mode:overlay;
}
.ground::after{ /* subtle wet-stone sheen */
  content:'';position:absolute;inset:8%;border-radius:50%;
  background:radial-gradient(circle at 38% 30%, rgba(212,175,106,.08), transparent 55%);
  filter:blur(6px);
}

/* perimeter landscaping ring (flowers / bushes / grass) */
.landscape{position:absolute;inset:0;border-radius:50%;pointer-events:none}
.bush,.flower,.grass{position:absolute;left:50%;top:50%;transform-origin:0 0}
.bush{
  width:3.6%;height:2.4%;border-radius:50% 50% 40% 40%;
  background:radial-gradient(circle at 35% 30%, #2f4a33, #182419 80%);
  box-shadow:0 2px 4px rgba(0,0,0,.5);
}
.flower{
  width:.9%;height:.9%;border-radius:50%;
  background:radial-gradient(circle, var(--gold-soft) 0%, var(--gold) 55%, transparent 75%);
  box-shadow:0 0 6px 1px rgba(212,175,106,.45);
}
.grass{
  width:.5%;height:1.6%;border-radius:50% 50% 0 0;
  background:linear-gradient(#3a5a3f,#1c2c1f);
}

/* perimeter golden lights */
.lamp{
  position:absolute;left:50%;top:50%;width:1.1%;height:1.1%;border-radius:50%;
  background:radial-gradient(circle, #fff7e0 0%, var(--gold) 45%, transparent 72%);
  box-shadow:0 0 14px 5px rgba(212,175,106,.55), 0 0 34px 14px rgba(212,175,106,.22);
  animation:lampGlow 4.2s ease-in-out infinite;
}
@keyframes lampGlow{0%,100%{opacity:.72;filter:brightness(1)}50%{opacity:1;filter:brightness(1.35)}}

/* ============ NUMBER RING (brushed gold, 3D extruded) ============ */
.number{
  position:absolute;left:50%;top:50%;
  width:9%;height:9%;margin:-4.5% 0 0 -4.5%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-weight:700;
  font-size:clamp(13px,3.6vmin,22px);
  color:var(--gold-soft);
  letter-spacing:.5px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(212,175,106,.10) 0%, rgba(212,175,106,.02) 60%, transparent 75%);
  text-shadow:
    0 1px 0 #6e5325,
    0 2px 1px #54401d,
    0 3px 6px rgba(0,0,0,.8),
    0 0 14px rgba(212,175,106,.6);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.6));
}
.number span{
  background:linear-gradient(180deg, #fbeecb 0%, var(--gold) 48%, var(--gold-deep) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 6px rgba(241,217,168,.5));
}

/* ============ RING GUIDES (subtle, so the structure reads) ============ */
.track{
  position:absolute;left:50%;top:50%;border-radius:50%;
  border:1px solid rgba(212,175,106,.07);
  box-shadow:inset 0 0 18px rgba(0,0,0,.35);
  pointer-events:none;
}

/* ============ FOUNTAIN (Ring 1) ============ */
.fountain{
  position:absolute;left:50%;top:50%;
  width:calc(var(--radius-fountain) * 2);
  height:calc(var(--radius-fountain) * 2);
  margin-left:calc(var(--radius-fountain) * -1);
  margin-top:calc(var(--radius-fountain) * -1);
  border-radius:50%;
  background:radial-gradient(circle at 50% 50%, #2b2926 0%, #1d1b19 60%, #131211 100%);
  box-shadow:
    0 0 0 6px rgba(0,0,0,.35),
    0 0 0 8px rgba(212,175,106,.12),
    inset 0 6px 24px rgba(0,0,0,.7),
    0 18px 40px -8px rgba(0,0,0,.8);
}
.basin-rim{
  position:absolute;inset:6%;border-radius:50%;
  background:conic-gradient(from 0deg, #2a2825, #3a352e, #2a2825, #3a352e, #2a2825);
  box-shadow:inset 0 2px 6px rgba(255,255,255,.08), inset 0 -6px 14px rgba(0,0,0,.6);
}
.water{
  position:absolute;inset:14%;border-radius:50%;overflow:hidden;
  background:radial-gradient(circle at 42% 38%, var(--water-light) 0%, var(--water) 55%, #0a1f29 100%);
  box-shadow:inset 0 0 24px rgba(0,0,0,.55);
}
.water .ripple{
  position:absolute;inset:0;border-radius:50%;
  border:1px solid rgba(244,241,234,.28);
  animation:ripple 3.6s ease-out infinite;
  opacity:0;
}
.water .ripple:nth-child(2){animation-delay:1.2s}
.water .ripple:nth-child(3){animation-delay:2.4s}
@keyframes ripple{
  0%{transform:scale(.18);opacity:.55}
  85%{opacity:0}
  100%{transform:scale(1);opacity:0}
}
.water .glints{
  position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(circle at 36% 32%, rgba(255,255,255,.55) 0%, transparent 6%),
    radial-gradient(circle at 60% 52%, rgba(212,175,106,.4) 0%, transparent 9%),
    radial-gradient(circle at 46% 66%, rgba(241,217,168,.32) 0%, transparent 8%);
  mix-blend-mode:screen;
  animation:glintShift 7s ease-in-out infinite alternate;
}
@keyframes glintShift{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(3%,-2%) scale(1.06)}
}
.jet{
  position:absolute;left:50%;bottom:46%;width:5%;height:34%;
  transform:translateX(-50%);
  background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(127,183,201,.35) 70%, transparent);
  border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
  filter:blur(.4px);
  animation:jet 1.6s ease-in-out infinite;
  transform-origin:bottom center;
}
@keyframes jet{
  0%,100%{transform:translateX(-50%) scaleY(1);opacity:.85}
  50%{transform:translateX(-50%) scaleY(1.12);opacity:1}
}
.droplet{
  position:absolute;left:50%;top:18%;width:2.6%;height:2.6%;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #fff, var(--water-light) 60%, transparent 80%);
  animation:fall 1.6s cubic-bezier(.4,.0,.6,1) infinite;
  opacity:0;
}
.droplet:nth-child(2){left:44%;animation-delay:.5s}
.droplet:nth-child(3){left:58%;animation-delay:1s}
@keyframes fall{
  0%{transform:translateY(0) scale(.6);opacity:0}
  8%{opacity:1}
  70%{transform:translateY(135%) scale(.9);opacity:.9}
  82%{transform:translateY(150%) scale(1.4,.4);opacity:.5}
  100%{transform:translateY(150%) scale(1.4,.4);opacity:0}
}
.fountain-glow{
  position:absolute;inset:-18%;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle, rgba(212,175,106,.16) 0%, transparent 65%);
  filter:blur(8px);
  animation:lampGlow 5s ease-in-out infinite;
}

/* ============ HUMANS ============ */
/* Each figure stands on the squashed elliptical ground. Its anchor box
   is positioned so the FEET (bottom-center) land exactly on the orbit
   point, then counter-scaled vertically by 1/0.64 so the little person
   reads at normal, upright proportions instead of looking flattened. */
.figure-anchor{
  position:absolute;width:7.6%;aspect-ratio:1/1.9;
  transform-origin:50% 100%;
  transform:translate(-50%,-100%) scaleY(1.5625);
  will-change:left,top;
}
/* Hour & Minute humans: re-targeted once per second, then glide there
   linearly — continuous, "interpolated" motion with minimal JS work */
.figure-anchor.interp{
  transition:left 1s linear, top 1s linear;
}
.shadow{
  position:absolute;left:50%;bottom:2%;width:115%;height:16%;
  transform:translate(-50%,30%);
  background:radial-gradient(ellipse at center, rgba(0,0,0,.6) 0%, transparent 72%);
  filter:blur(2px);
  border-radius:50%;
}
.fig{
  position:absolute;inset:0;
  transform-origin:50% 92%;
}
.fig svg{width:100%;height:100%;display:block;overflow:visible}

/* Hour Human — Elegant Gentleman: slow sway */
.gentleman .torso{animation:gentlemanSway 6s ease-in-out infinite}
.gentleman .arm-l{animation:gentlemanArm 6s ease-in-out infinite}
.gentleman .arm-r{animation:gentlemanArm 6s ease-in-out infinite reverse}
@keyframes gentlemanSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes gentlemanArm{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

/* Minute Human — Explorer: walking cycle */
.explorer .leg-l{animation:walk 1.05s ease-in-out infinite}
.explorer .leg-r{animation:walk 1.05s ease-in-out infinite -.525s}
.explorer .arm-l{animation:walkArm 1.05s ease-in-out infinite -.525s}
.explorer .arm-r{animation:walkArm 1.05s ease-in-out infinite}
.explorer .torso{animation:bob 1.05s ease-in-out infinite}
@keyframes walk{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-20deg)}}
@keyframes walkArm{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
@keyframes bob{0%,50%,100%{transform:translateY(0)}25%,75%{transform:translateY(-2.4%)}}

/* Seconds Human — Runner: fast jogging cycle */
.runner .leg-l{animation:run .42s ease-in-out infinite}
.runner .leg-r{animation:run .42s ease-in-out infinite -.21s}
.runner .arm-l{animation:runArm .42s ease-in-out infinite -.21s}
.runner .arm-r{animation:runArm .42s ease-in-out infinite}
.runner .torso{animation:runBob .42s ease-in-out infinite}
.runner .head{animation:headBob .42s ease-in-out infinite}
@keyframes run{0%,100%{transform:rotate(46deg)}50%{transform:rotate(-46deg)}}
@keyframes runArm{0%,100%{transform:rotate(-40deg)}50%{transform:rotate(40deg)}}
@keyframes runBob{0%,50%,100%{transform:translateY(0) rotate(4deg)}25%,75%{transform:translateY(-4%) rotate(-2deg)}}
@keyframes headBob{0%,50%,100%{transform:translateY(0)}25%,75%{transform:translateY(-1.4%)}}

/* ============ AMBIENT EFFECTS ============ */
.ambient{position:absolute;inset:0;border-radius:50%;pointer-events:none;overflow:hidden}
.firefly{
  position:absolute;width:.6%;height:.6%;border-radius:50%;
  background:radial-gradient(circle, #fff8df 0%, var(--gold-soft) 45%, transparent 75%);
  box-shadow:0 0 8px 3px rgba(241,217,168,.5);
  animation:drift 9s ease-in-out infinite, twinkle 2.6s ease-in-out infinite;
}
@keyframes drift{
  0%{transform:translate(0,0)}
  25%{transform:translate(4%,-6%)}
  50%{transform:translate(-3%,-2%)}
  75%{transform:translate(-5%,5%)}
  100%{transform:translate(0,0)}
}
@keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.95}}
.leaf{
  position:absolute;width:1.1%;height:1.5%;
  background:linear-gradient(135deg, #6b8f4e, #344f29);
  clip-path:ellipse(50% 50% at 50% 50%);
  opacity:.8;
  animation:leafFall linear infinite;
}
@keyframes leafFall{
  0%{transform:translateY(-10%) rotate(0deg);opacity:.85}
  100%{transform:translateY(120%) rotate(380deg);opacity:.15}
}
.fog{
  position:absolute;inset:-10%;border-radius:50%;
  background:radial-gradient(ellipse at 50% 70%, rgba(180,200,220,.07), transparent 60%);
  filter:blur(10px);
  animation:fogDrift 22s ease-in-out infinite alternate;
}
@keyframes fogDrift{0%{transform:translateX(-3%)}100%{transform:translateX(3%)}}

/* ============ HOURLY CELEBRATION ============ */
.celebration-burst{
  position:absolute;left:50%;top:14%;width:1%;height:1%;pointer-events:none;
}
.spark{
  position:absolute;left:0;top:0;width:5px;height:5px;border-radius:50%;
  background:var(--gold-soft);
  box-shadow:0 0 10px 3px rgba(241,217,168,.7);
  opacity:0;
}
.spark.go{animation:spark 1.1s ease-out forwards}
@keyframes spark{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--dx), var(--dy)) scale(.2);opacity:0}
}
.banner{
  position:absolute;left:50%;top:6%;transform:translate(-50%,-50%) scale(.6);
  font-family:'Cinzel',serif;font-size:clamp(11px,2.6vmin,16px);letter-spacing:3px;
  color:var(--gold-soft);text-transform:uppercase;white-space:nowrap;
  text-shadow:0 0 14px rgba(241,217,168,.65);
  opacity:0;transition:opacity .5s ease, transform .5s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.banner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ============ HUD ============ */
.hud{
  position:absolute;left:50%;bottom:3%;transform:translateX(-50%);
  text-align:center;z-index:5;pointer-events:none;
}
.digital{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(15px,3.4vmin,22px);letter-spacing:3px;color:rgba(241,217,168,.78);
  text-shadow:0 0 10px rgba(212,175,106,.35);
}
.date-line{font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:rgba(244,241,234,.35);margin-top:2px}

/* ============ SETTINGS ============ */
.gear{
  position:absolute;top:3%;right:3%;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.05);border:1px solid rgba(212,175,106,.25);
  display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:20;
  color:var(--gold-soft);font-size:1.05rem;transition:background .2s, transform .2s;
}
.gear:active{transform:scale(.92)}
.gear:hover{background:rgba(212,175,106,.14)}

.panel{
  position:fixed;inset:0;z-index:50;background:rgba(3,3,3,.78);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s ease;
}
.panel.on{opacity:1;pointer-events:all}
.sheet{
  width:min(86vw,360px);background:linear-gradient(165deg,#1a1a1a,#0f0f0f);
  border:1px solid rgba(212,175,106,.2);border-radius:18px;padding:22px 22px 26px;
  transform:translateY(16px) scale(.97);transition:transform .3s cubic-bezier(.34,1.4,.64,1);
}
.panel.on .sheet{transform:translateY(0) scale(1)}
.sheet h2{font-family:'Cinzel',serif;font-size:1.05rem;letter-spacing:2px;color:var(--gold-soft);margin-bottom:4px}
.sheet .hint{font-size:.7rem;color:rgba(244,241,234,.4);margin-bottom:16px;letter-spacing:.5px}
.opt{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:11px 0;border-top:1px solid rgba(255,255,255,.06);
  font-size:.82rem;color:rgba(244,241,234,.85);letter-spacing:.3px;
}
.opt:first-of-type{border-top:none}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:rgba(255,255,255,.12);border-radius:30px;transition:.2s;cursor:pointer}
.slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#cfcfcf;border-radius:50%;transition:.2s}
.switch input:checked + .slider{background:var(--gold-deep)}
.switch input:checked + .slider::before{transform:translateX(18px);background:var(--gold-soft)}
.close-btn{
  margin-top:18px;width:100%;padding:11px;border:none;border-radius:30px;cursor:pointer;
  background:linear-gradient(120deg,var(--gold) 0%, var(--gold-deep) 100%);
  color:#1a1306;font-weight:600;letter-spacing:1px;font-size:.8rem;text-transform:uppercase;
}

/* Reduced motion mode: calm everything down */
.reduced .firefly,.reduced .leaf,.reduced .fog,.reduced .lamp,.reduced .water .ripple,
.reduced .gentleman .torso,.reduced .gentleman .arm-l,.reduced .gentleman .arm-r{
  animation-duration:0.001s,0.001s !important;
  animation:none !important;
}
.reduced .water .glints{animation-duration:18s}
</style>
</head>
<body>
<div class="stage">
  <div class="scene">
    <div class="dial" id="dial">
      <div class="plane" id="plane">

        <div class="ground" id="ground"></div>
        <div class="landscape" id="landscape"></div>

        <!-- ring guides -->
        <div class="track" id="trackHour"></div>
        <div class="track" id="trackMinute"></div>
        <div class="track" id="trackSecond"></div>

        <!-- numbers 1-12 -->
        <div id="numbers"></div>

        <!-- ambient layer -->
        <div class="ambient" id="ambient">
          <div class="fog"></div>
        </div>

        <!-- humans are appended directly to .plane by JS so that their
             left/top percentages resolve against the full circle -->

        <!-- celebration overlay -->
        <div class="banner" id="banner">A new hour begins</div>
        <div class="celebration-burst" id="burst"></div>

        <!-- fountain (ring 1, drawn last so it sits visually "above" the ground) -->
        <div class="fountain" id="fountain">
          <div class="fountain-glow"></div>
          <div class="basin-rim"></div>
          <div class="water">
            <div class="glints"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="jet"></div>
            <div class="droplet"></div>
            <div class="droplet"></div>
            <div class="droplet"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="hud">
    <div class="digital" id="digitalTime">--:--:--</div>
    <div class="date-line" id="dateLine">LIVING HUMAN CLOCK</div>
  </div>

  <div class="gear" id="gearBtn" title="Settings">&#9881;</div>
</div>

<div class="panel" id="panel">
  <div class="sheet">
    <h2>Diorama Settings</h2>
    <div class="hint">Tune the living clock to your taste &amp; battery needs</div>
    <label class="opt">Reduce animation
      <span class="switch"><input type="checkbox" id="optReduce"><span class="slider"></span></span>
    </label>
    <label class="opt">Disable hourly celebration
      <span class="switch"><input type="checkbox" id="optCelebration"><span class="slider"></span></span>
    </label>
    <label class="opt">Disable fountain effects
      <span class="switch"><input type="checkbox" id="optFountain"><span class="slider"></span></span>
    </label>
    <label class="opt">Ambient effects (fireflies &amp; leaves)
      <span class="switch"><input type="checkbox" id="optAmbient" checked><span class="slider"></span></span>
    </label>
    <button class="close-btn" id="closeBtn">Done</button>
  </div>
</div>

<script src="livingclock.js"></script>
</body>
</html>
